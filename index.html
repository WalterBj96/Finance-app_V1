<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Mensuel</title>

  <!-- Chart.js — librairie externe pour le camembert -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      padding: 2rem;
    }

    .app { max-width: 720px; margin: 0 auto; }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; }
    .month-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: #666;
      background: #e8e8e0;
      border-radius: 20px;
      padding: 2px 12px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1rem;
    }

    .metric { background: #f5f5f0; border-radius: 8px; padding: 1rem; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
    .metric-value.green  { color: #3B6D11; }
    .metric-value.orange { color: #854F0B; }
    .metric-value.red    { color: #A32D2D; }

    .budget-bar-wrap { margin: 1rem 0; }
    .budget-bar-track {
      height: 12px;
      background: #e8e8e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .budget-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease, background 0.4s ease;
    }
    .budget-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .budget-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #888; }

    input, select {
      width: 100%;
      padding: 7px 10px;
      font-size: 14px;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }
    input:focus, select:focus { border-color: #888; }

    .btn-add {
      padding: 7px 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.85; }

    .chart-expense-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .chart-wrap { position: relative; height: 220px; }

    .legend { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-pct { font-size: 12px; color: #888; margin-left: auto; }

    .expense-list { max-height: 260px; overflow-y: auto; }
    .expense-item { padding: 8px 0; border-bottom: 1px solid #f0f0e8; }
    .expense-item:last-child { border-bottom: none; }
    .expense-row { display: flex; align-items: center; justify-content: space-between; }
    .expense-cat { font-size: 11px; color: #888; margin-top: 2px; }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 15px;
      padding: 2px 5px;
      border-radius: 4px;
    }
    .btn-icon:hover { background: #f0f0e8; }
    .btn-del:hover  { color: #A32D2D; }
    .btn-edit:hover { color: #185FA5; }

    .edit-form {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto auto;
      gap: 6px;
      align-items: end;
      padding: 8px;
      background: #f5f5f0;
      border-radius: 8px;
    }

    .btn-save {
      padding: 5px 12px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-reset {
    padding: 5px 12px;
    background: none;
    border: 1px solid #d0d0c8;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    color: #888;
}
.btn-reset:hover { background: #fee; color: #A32D2D; }

    .btn-cancel {
      padding: 5px 10px;
      background: none;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: #666;
    }
    .btn-cancel:hover { background: #e8e8e0; }

    .empty { font-size: 13px; color: #888; text-align: center; padding: 1.5rem 0; }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>Budget mensuel</h1>
      <button class="btn-reset" onclick="resetMonth()">Réinitialiser</button>
  </div>
    <span class="month-badge" id="monthBadge"></span>
  </div>

  <div class="card">
    <div class="section-title">Budget total</div>
    <div class="budget-row">
      <div class="form-group">
        <label>Montant du budget (€)</label>
        <input type="number" id="budgetInput" placeholder="ex: 2000" min="0" />
      </div>
      <button class="btn-add" onclick="setBudget()">Définir</button>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-bar-track">
        <div class="budget-bar-fill" id="budgetBar" style="width:0%; background:#639922;"></div>
      </div>
      <div class="budget-label">
        <span id="barLeft">0€ dépensé</span>
        <span id="barRight">Budget: 0€</span>
      </div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Budget</div>
      <div class="metric-value" id="mBudget">0 €</div>
    </div>
    <div class="metric">
      <div class="metric-label">Dépensé</div>
      <div class="metric-value" id="mSpent">0 €</div>
    </div>
    <div class="metric">
      <div class="metric-label">Restant</div>
      <div class="metric-value" id="mLeft">0 €</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Ajouter une dépense</div>
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="expName" placeholder="ex: Loyer" />
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="expCat">
          <option>Logement</option>
          <option>Nourriture</option>
          <option>Transport</option>
          <option>Santé</option>
          <option>Loisirs</option>
          <option>Vêtements</option>
          <option>Autres</option>
        </select>
      </div>
      <div class="form-group">
        <label>Montant (€)</label>
        <input type="number" id="expAmount" placeholder="ex: 150" min="0" />
      </div>
      <button class="btn-add" onclick="addExpense()">+ Ajouter</button>
    </div>
  </div>

  <div class="chart-expense-row">
    <div class="card">
      <div class="section-title">Répartition</div>
      <div class="chart-wrap">
        <canvas id="pieChart" role="img" aria-label="Camembert des dépenses par catégorie">
          Aucune dépense enregistrée.
        </canvas>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Légende</div>
      <div class="legend" id="legend">
        <p class="empty">Aucune catégorie</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Dépenses du mois</div>
    <div class="expense-list" id="expenseList">
      <p class="empty">Aucune dépense ajoutée</p>
    </div>
  </div>

</div>

<!--
  ORDRE DE CHARGEMENT — très important !
  Le navigateur lit les scripts de haut en bas.
  Une fonction ne peut utiliser que ce qui est déjà chargé.

  1. structure_donnee.js  → définit "state"
  2. localStorage.js      → définit "monthKey" + "save()"
  3. calcule.js           → définit "getTotal()", "getByCategory()", "getCouleur()"
  4. rafraichissement.js  → définit "render()" 
  5. app.js               → définit "addExpense()", "deleteExpense()", "editExpense()"
-->
<script src="structure_donnee.js"></script>
<script src="localStorage.js"></script>
<script src="calcule.js"></script>
<script src="rafraichissement.js"></script>
<script src="app.js"></script>

<!-- Initialisation après chargement de tous les fichiers -->
<script>
  document.getElementById('monthBadge').textContent =
    new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })

  render()
</script>

</body>
</html>
